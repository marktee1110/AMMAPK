<!doctype html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>🎯 P2 التوقيع المساحي - م. عمار يوسف</title>

  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Error', err));
      });
    }
  </script>

  <style>
    :root{--main:#6366f1;--danger:#f43f5e;--ok:#10b981;--bg:#ffffff}
    body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:#000;direction:ltr; text-align: left; overflow-x: hidden;}
    
    nav {
      background: #1e293b; 
      padding: 20px 10px; 
      text-align: center; 
      display: flex; 
      justify-content: center; 
      gap: 12px; 
      flex-wrap: wrap;
      margin-top: 10px; 
      border-bottom: 3px solid #000;
    }
    nav a {
      color: #fff; 
      text-decoration: none; 
      font-size: 16px; 
      font-weight: 900; 
      background: rgba(255,255,255,0.15); 
      padding: 10px 20px; 
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    header{background:var(--main);color:#fff;padding:15px;text-align:center;}
    header h1{margin:0;font-size:24px;font-weight:900}
    .container{padding:8px; box-sizing: border-box; max-width: 980px; margin: 0 auto;}
    .card{background:#fff; padding:12px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); margin-bottom:10px; border:2px solid #000;}
    
    .input{padding:12px; border:3px solid #000; border-radius:8px; width:100%; font-size:18px; font-weight:900; box-sizing:border-box; background:#fff !important; color:#000 !important;}
    .search-wrap { position: relative; width: 100%; }
    .results-box { 
        position: absolute; bottom: 100%; left: 0; right: 0; 
        background: #fff; border: 3px solid #000; border-bottom: none;
        max-height: 180px; overflow-y: auto; z-index: 9999; display: none;
        border-radius: 8px 8px 0 0; box-shadow: 0 -10px 20px rgba(0,0,0,0.4);
    }
    .result-item { padding: 10px 12px; border-bottom: 1px solid #ddd; cursor: pointer; font-weight: 900; font-size: 14px; color: #000; }
    .result-item:hover { background: #f0f9ff; }

    .btn{padding:12px; border:none; border-radius:8px; cursor:pointer; font-size:18px; font-weight:900;}
    .btn.main{background:#000;color:#fff}
    .btn.ok{background:var(--ok);color:#fff}
    .btn.danger{background:var(--danger);color:#fff}

    table{width:100%; border-collapse: collapse; background:#fff; margin-top: 10px;}
    th, td { border: 3px solid #000; text-align: center; font-weight: 900; padding: 12px 4px; font-size: 20px; color:#000;}
    th { background: #eee; font-size: 14px; }
    
    .hidden { display: none !important; }
    .summary-box { display: flex; justify-content: space-between; align-items: center; background: #f0f9ff; padding: 12px; border-radius: 8px; border: 3px solid #000; font-weight: 900; font-size: 18px; }
    .modal { display:none; position:fixed; z-index:10000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); overflow-y:auto; }
    .modal-content { background:#fff; margin:2% auto; padding:15px; width:94%; border-radius:10px; border:2px solid #000; }
    #summaryText { background:#fff; color:#000; padding:15px; border:2px solid #000; font-family:monospace; font-size:16px; font-weight:900; white-space:pre-wrap; text-align:left; line-height:1.4; }
  </style>
</head>
<body>

<nav>
    <a href="index.html">🏠 الرئيسية</a>
    <a href="p1_survey.html">📐 الرفع</a>
    <a href="p3_db_manager.html">🗄️ النقاط</a>
</nav>

<header><h1>🎯 برنامج 2: التوقيع المساحي</h1><p>م. عمار يوسف</p></header>

<div class="container">
  <div class="card">
    <select id="sessionsDropdown" class="input" style="font-size: 14px; margin-bottom: 8px;"></select>
    <div style="display:flex; gap:8px;">
        <button onclick="startNew()" class="btn main" style="flex:1">➕ جديدة</button>
        <button onclick="saveSess()" class="btn ok" style="flex:1">💾 حفظ</button>
        <button onclick="showSummary()" class="btn" style="flex:1.2; background:#334155; color:#fff">📝 ملخص</button>
    </div>
  </div>

  <div class="card">
    <div id="stEdit">
        <div class="search-wrap">
            <input id="stName" class="input" placeholder="نقطة الوقوف (بحث)..." autocomplete="off">
            <div id="stResults" class="results-box"></div>
        </div>
        <div style="display:flex;gap:5px; margin-top:5px;">
            <input id="stX" class="input" type="number" step="any" inputmode="decimal" placeholder="X">
            <input id="stY" class="input" type="number" step="any" inputmode="decimal" placeholder="Y">
        </div>
        <button onclick="toggleLock('st')" class="btn ok" style="width:100%;margin-top:8px;">✅ تثبيت</button>
    </div>
    <div id="stShow" class="summary-box hidden">
        <div>📍 <span id="txtStN"></span> | X:<span id="txtStX"></span> | Y:<span id="txtStY"></span></div>
        <button onclick="toggleLock('st')" class="btn" style="background:#000; color:#fff; border-radius:50%; padding:5px 10px; border:none;">✏️</button>
    </div>
  </div>

  <div class="card">
    <div id="bsEdit">
        <div class="search-wrap">
            <input id="bsName" class="input" placeholder="نقطة الزيرو (بحث)..." autocomplete="off">
            <div id="bsResults" class="results-box"></div>
        </div>
        <div style="display:flex;gap:5px; margin-top:5px;">
            <input id="bsX" class="input" type="number" step="any" inputmode="decimal" placeholder="X">
            <input id="bsY" class="input" type="number" step="any" inputmode="decimal" placeholder="Y">
        </div>
        <button onclick="toggleLock('bs')" class="btn ok" style="width:100%;margin-top:8px;">✅ تثبيت</button>
    </div>
    <div id="bsShow" class="summary-box hidden">
        <div>🎯 <span id="txtBsN"></span> | X:<span id="txtBsX"></span> | Y:<span id="txtBsY"></span></div>
        <button onclick="toggleLock('bs')" class="btn" style="background:#000; color:#fff; border-radius:50%; padding:5px 10px; border:none;">✏️</button>
    </div>
  </div>

  <div class="card">
    <div style="display:flex; gap:8px;">
        <div style="flex:2; display:flex; flex-direction:column; gap:5px;">
            <input id="tgX" class="input" type="number" step="any" placeholder="X مطلوب" onkeypress="handleKey(event, 'tgY')" inputmode="decimal">
            <input id="tgY" class="input" type="number" step="any" placeholder="Y مطلوب" onkeypress="handleKey(event, 'addInv')" inputmode="decimal">
        </div>
        <button onclick="addInv()" class="btn main" style="flex:0.8;font-size:20px">➕<br>حساب</button>
    </div>
  </div>

  <div class="card">
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>#</th><th>X</th><th>Y</th><th style="color:red">HD</th><th>HR</th></tr></thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>
    <button onclick="updateAll()" class="btn danger" style="width:100%; margin-top:10px;">🔄 تحديث الحسابات</button>
  </div>
</div>

<div id="summaryModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center">📋 ملخص وتصدير الجلسة</h2>
        <pre id="summaryText"></pre>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn ok" style="flex:2; background:#000" onclick="downloadTXT()">💾 تصدير .txt (عربي)</button>
            <button class="btn" style="flex:1; background:#ddd; color:#000" onclick="document.getElementById('summaryModal').style.display='none'">إغلاق</button>
        </div>
    </div>
</div>

<script>
    const GRAD = 200 / Math.PI;
    const fixX = (v) => -Math.abs(parseFloat(v || 0));
    let trgs = [], sessId = null, sessInfo = { name: "" };

    function handleKey(e, targetId) {
        if (e.key === "Enter") {
            if (targetId === 'addInv') addInv();
            else document.getElementById(targetId).focus();
        }
    }

    function inv(sx, sy, bx, by, tx, ty) {
        const bz = (Math.atan2(bx - sx, by - sy) * GRAD + 400) % 400;
        const tz = (Math.atan2(tx - sx, ty - sy) * GRAD + 400) % 400;
        return { d: Math.sqrt(Math.pow(tx - sx, 2) + Math.pow(ty - sy, 2)), r: (tz - bz + 400) % 400 };
    }

    function addInv() {
        const txIn = document.getElementById("tgX"), tyIn = document.getElementById("tgY");
        const tx = fixX(txIn.value), ty = parseFloat(tyIn.value);
        if(isNaN(tx) || isNaN(ty)) return;
        const sx = fixX(document.getElementById("stX").value), sy = parseFloat(document.getElementById("stY").value || 0);
        const bx = fixX(document.getElementById("bsX").value), by = parseFloat(document.getElementById("bsY").value || 0);
        const res = inv(sx, sy, bx, by, tx, ty);
        trgs.push({ x: tx, y: ty, d: res.d, r: res.r });
        render(); 
        txIn.value = ""; tyIn.value = ""; 
        txIn.focus();
    }

    function render() {
        document.getElementById("resBody").innerHTML = trgs.map((t, i) => `<tr><td>${i+1}</td><td>${t.x.toFixed(3)}</td><td>${t.y.toFixed(3)}</td><td style="color:red; font-size:22px;">${t.d.toFixed(2)}</td><td>${t.r.toFixed(4)}</td></tr>`).join("");
    }

    function toggleLock(id) {
        const e = document.getElementById(id + 'Edit'), s = document.getElementById(id + 'Show');
        if(e.classList.contains('hidden')) { e.classList.remove('hidden'); s.classList.add('hidden'); }
        else {
            const n = document.getElementById(id + 'Name').value, x = document.getElementById(id + 'X').value, y = document.getElementById(id + 'Y').value;
            if(!n || !x || !y) return alert("البيانات ناقصة");
            document.getElementById('txt' + id.charAt(0).toUpperCase() + id.slice(1) + 'N').innerText = n;
            document.getElementById('txt' + id.charAt(0).toUpperCase() + id.slice(1) + 'X').innerText = fixX(x).toFixed(2);
            document.getElementById('txt' + id.charAt(0).toUpperCase() + id.slice(1) + 'Y').innerText = parseFloat(y).toFixed(2);
            e.classList.add('hidden'); s.classList.remove('hidden');
        }
    }

    window.onload = () => {
        loadSess();
        const searchConfigs = [
            { id: 'stName', res: 'stResults', other: 'bsName', pre: 'st' },
            { id: 'bsName', res: 'bsResults', other: 'stName', pre: 'bs' }
        ];
        searchConfigs.forEach(conf => {
            const inp = document.getElementById(conf.id);
            const resBox = document.getElementById(conf.res);
            inp.addEventListener('input', () => {
                const queryText = inp.value.toLowerCase().trim();
                const otherVal = document.getElementById(conf.other).value.toLowerCase().trim();
                if (!queryText) { resBox.style.display='none'; return; }
                const keywords = queryText.split(/\s+/); 
                const db = JSON.parse(localStorage.getItem("pointsDB") || "[]");
                const matches = db.filter(p => {
                    const n = String(p.name).toLowerCase();
                    const isMatch = keywords.every(kw => n.includes(kw));
                    return isMatch && n !== otherVal;
                });
                if (matches.length > 0) {
                    resBox.innerHTML = matches.slice(0, 15).map(p => `<div class="result-item" onclick="pickPt('${conf.id}','${p.name}',${p.x},${p.y},'${conf.res}','${conf.pre}')">${p.name} <small style="color:blue">(${p.area || ''})</small></div>`).join("");
                    resBox.style.display = 'block';
                } else { resBox.style.display = 'none'; }
            });
        });
        document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) document.querySelectorAll('.results-box').forEach(b => b.style.display='none'); });
    };

    function pickPt(inpId, name, x, y, resId, pre) {
        document.getElementById(inpId).value = name;
        document.getElementById(pre + 'X').value = Math.abs(x);
        document.getElementById(pre + 'Y').value = y;
        document.getElementById(resId).style.display = 'none';
    }

    function saveSess() {
        if(trgs.length === 0) return alert("لا توجد بيانات");
        let n = sessInfo.name || prompt("اسم الجلسة:"); if(!n) return;
        sessInfo.name = n;
        let db = JSON.parse(localStorage.getItem("sessionsDB_P2") || "[]");
        const s = { id: sessId || Date.now(), name: n, date: new Date().toLocaleDateString('ar-EG'), st: { n: document.getElementById("stName").value, x: document.getElementById("stX").value, y: document.getElementById("stY").value }, bs: { n: document.getElementById("bsName").value, x: document.getElementById("bsX").value, y: document.getElementById("bsY").value }, data: trgs };
        if(sessId) db[db.findIndex(x => x.id === sessId)] = s; else { sessId = s.id; db.push(s); }
        localStorage.setItem("sessionsDB_P2", JSON.stringify(db)); loadSess(); alert("تم الحفظ ✅");
    }

    function loadSess() {
        const ss = JSON.parse(localStorage.getItem("sessionsDB_P2") || "[]");
        document.getElementById("sessionsDropdown").innerHTML = '<option value="">--- استرجاع جلسة ---</option>' + ss.reverse().map(s => `<option value="${s.id}">${s.name}</option>`).join("");
    }

    document.getElementById("sessionsDropdown").onchange = function() {
        const s = JSON.parse(localStorage.getItem("sessionsDB_P2") || "[]").find(x => x.id == this.value);
        if(s) { sessId = s.id; sessInfo.name = s.name; document.getElementById("stName").value = s.st.n; document.getElementById("stX").value = s.st.x; document.getElementById("stY").value = s.st.y; document.getElementById("bsName").value = s.bs.n; document.getElementById("bsX").value = s.bs.x; document.getElementById("bsY").value = s.bs.y; trgs = s.data; toggleLock('st'); toggleLock('bs'); render(); }
    };

    function startNew() { if(confirm("بدء جديدة؟")) location.reload(); }

    function showSummary() {
        let txt = `========================================\n   تقرير التوقيع المساحي - م. عمار يوسف\n========================================\nالجلسة: ${sessInfo.name || "جديدة"}\nالتاريخ: ${new Date().toLocaleDateString('ar-EG')}\n----------------------------------------\nالوقوف: ${document.getElementById("stName").value}\nX: ${document.getElementById("stX").value} | Y: ${document.getElementById("stY").value}\n----------------------------------------\nالزيرو: ${document.getElementById("bsName").value}\nX: ${document.getElementById("bsX").value} | Y: ${document.getElementById("bsY").value}\n========================================\n# | X | Y | HD | HR\n----------------------------------------\n`;
        trgs.forEach((t, i) => { txt += `${i+1} | ${t.x.toFixed(3)} | ${t.y.toFixed(3)} | ${t.d.toFixed(2)} | ${t.r.toFixed(4)}\n`; });
        document.getElementById("summaryText").innerText = txt;
        document.getElementById("summaryModal").style.display = "block";
    }

    // الوظيفة المحدثة لملائمة تطبيق APK (التوقيع P2)
    function downloadTXT() {
        const content = document.getElementById("summaryText").innerText;
        
        // تنظيف الاسم وإضافة طابع زمني دقيق
        const sessionName = (sessInfo.name || "Stakeout_Report").replace(/[/\\?%*:|"<>]/g, '-');
        const now = new Date();
        const dateStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
        const timeStr = `${now.getHours()}${now.getMinutes()}`;
        const fileName = `${sessionName}_${dateStr}_${timeStr}.txt`;

        const BOM = '\uFEFF'; 
        const blob = new Blob([BOM + content], { type: 'text/plain;charset=utf-8' });
        
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        setTimeout(() => URL.revokeObjectURL(link.href), 100);
    }

    function updateAll() {
        const sx = fixX(document.getElementById("stX").value), sy = parseFloat(document.getElementById("stY").value || 0);
        const bx = fixX(document.getElementById("bsX").value), by = parseFloat(document.getElementById("bsY").value || 0);
        trgs = trgs.map(t => { const res = inv(sx, sy, bx, by, t.x, t.y); return { ...t, d: res.d, r: res.r }; });
        render(); alert("تم التحديث ✅");
    }
</script>
</body>
</html>
