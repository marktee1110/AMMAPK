<!doctype html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>📂 P4 مدير الجلسات — م. عمار يوسف</title>

  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => console.log('PWA Ready ✅'));
      });
    }
  </script>

  <style>
    :root{--main:#f59e0b;--danger:#ef4444;--p1:#0ea5e9;--p2:#6366f1;--bg:#ffffff}
    body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:#000;direction:ltr; text-align: left;}
    
    /* تنسيق أزرار التنقل الموحد والمنخفض عن السقف */
    nav {
      background: #1e293b; 
      padding: 20px 10px; 
      text-align: center; 
      display: flex; 
      justify-content: center; 
      gap: 12px; 
      flex-wrap: wrap;
      margin-top: 10px; 
      border-bottom: 3px solid #000;
    }
    nav a {
      color: #fff; 
      text-decoration: none; 
      font-size: 16px; 
      font-weight: 900; 
      background: rgba(255,255,255,0.15); 
      padding: 10px 20px; 
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    header{background:var(--main);color:#fff;padding:15px;text-align:center;}
    header h1{margin:0;font-size:24px;font-weight:900}
    
    .container{max-width:980px;margin:10px auto;padding:0 8px; box-sizing: border-box;}
    .card{background:#fff;padding:15px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1);margin-bottom:12px;border:2px solid #000}
    
    table{width:100%; border-collapse:collapse; margin-top:10px;}
    th,td{border:3px solid #000; padding:12px 4px; text-align:center; font-size:18px; font-weight:900; color: #000;}
    th{background:#eee; font-size:12px;}
    
    .btn{padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight:900; font-size: 18px; width: 100%; box-sizing: border-box;}
    .badge{padding:4px 8px; border-radius:6px; font-size:12px; color:#fff; font-weight:bold;}
    .badge.p1{background:var(--p1)} .badge.p2{background:var(--p2)}
    
    .modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); overflow-y:auto; }
    .modal-content { background:#fff; margin:2% auto; padding:15px; width:94%; border-radius:10px; border:2px solid #000; box-sizing: border-box;}
    pre { background:#fff; color:#000; padding:15px; border:2px solid #000; font-family:monospace; font-size:18px; font-weight:900; white-space:pre-wrap; text-align:left; direction:ltr; line-height: 1.4;}
  </style>
</head>
<body>

<nav>
    <a href="index.html">🏠 الرئيسية</a>
    <a href="p1_survey.html">📐 الرفع</a>
    <a href="p2_stakeout.html">🎯 التوقيع</a>
    <a href="p3_db_manager.html">🗄️ النقاط</a>
</nav>

<header>
    <h1>📂 أرشيف الجلسات المساحية</h1>
    <p>م. عمار يوسف</p>
</header>

<div class="container">
  <!-- زر التصدير الشامل المتوافق مع APK -->
  <div class="card">
    <button class="btn" style="background:#000; color:#fff;" onclick="exportAllSessions()">📥 تصدير جميع الجلسات (ملف واحد)</button>
  </div>

  <div class="card" style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>النوع</th>
          <th>الجلسة</th>
          <th>التاريخ</th>
          <th>⚙️</th>
        </tr>
      </thead>
      <tbody id="sessionsBody"></tbody>
    </table>
  </div>
</div>

<!-- واجهة عرض تفاصيل الجلسة -->
<div id="viewModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center">🔍 تقرير الجلسة المؤرشفة</h2>
        <pre id="summaryText"></pre>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn" style="flex:2; background:#000; color:#fff;" id="exportBtn">💾 تصدير .txt</button>
            <button class="btn" style="flex:1; background:#ddd; color: #000;" onclick="document.getElementById('viewModal').style.display='none'">إغلاق</button>
        </div>
    </div>
</div>

<script>
    // وظيفة جلب كافة الجلسات من الذاكرة المحلية
    function getAllSessions() {
        const p1 = JSON.parse(localStorage.getItem("sessionsDB_P1") || "[]").map(s => ({...s, db:'sessionsDB_P1', type:'رفع', cls:'p1'}));
        const p2 = JSON.parse(localStorage.getItem("sessionsDB_P2") || "[]").map(s => ({...s, db:'sessionsDB_P2', type:'توقيع', cls:'p2'}));
        return [...p1, ...p2].sort((a,b) => b.id - a.id);
    }

    // بناء الجدول عند تحميل الصفحة
    function init() {
        const all = getAllSessions();
        document.getElementById("sessionsBody").innerHTML = all.map(s => `
        <tr>
            <td><span class="badge ${s.cls}">${s.type}</span></td>
            <td><b>${s.name}</b></td>
            <td><small>${s.date}</small></td>
            <td>
                <div style="display:flex; gap:5px; justify-content:center;">
                    <button class="btn" style="background:#10b981; color:#fff; width:auto; padding:5px 12px;" onclick="openS('${s.db}', ${s.id})">👁️</button>
                    <button class="btn" style="background:#ef4444; color:#fff; width:auto; padding:5px 12px;" onclick="delS('${s.db}', ${s.id})">🗑</button>
                </div>
            </td>
        </tr>`).join("");
    }

    // وظيفة توليد النص الخاص بكل جلسة
    function generateSessionText(s) {
        let txt = `========================================\n`;
        txt += `التقرير المؤرشف: ${s.name}\n`;
        txt += `نوع العمل: ${s.type}\n`;
        txt += `التاريخ: ${s.date}\n`;
        txt += `الوقفة: ${s.st.n} (X:${s.st.x}, Y:${s.st.y})\n`;
        txt += `الزيرو: ${s.bs.n} (X:${s.bs.x}, Y:${s.bs.y})\n`;
        txt += `========================================\n\n`;
        
        s.data.forEach((d, i) => {
            const xVal = Number(d.x).toFixed(3);
            const yVal = Number(d.y).toFixed(3);
            const hdVal = (d.hd || d.d || 0).toFixed(2);
            const hrVal = (d.hr || d.r || 0).toFixed(4);
            txt += `P${i+1}: X=${xVal}, Y=${yVal} | HD=${hdVal}, HR=${hrVal}\n`;
            txt += `--------------------\n`;
        });
        txt += `\n\n`;
        return txt;
    }

    // فتح تفاصيل جلسة محددة
    function openS(dbN, id) {
        const s = JSON.parse(localStorage.getItem(dbN)).find(x => x.id === id);
        const typeLabel = dbN === 'sessionsDB_P1' ? 'رفع' : 'توقيع';
        const txt = generateSessionText({...s, type: typeLabel});
        
        document.getElementById("summaryText").innerText = txt;
        document.getElementById("exportBtn").onclick = () => {
            // تنظيف الاسم وإضافة التاريخ والوقت لاسم الملف
            const safeName = s.name.replace(/[/\\?%*:|"<>]/g, '-');
            const now = new Date();
            const timestamp = `${now.getFullYear()}${now.getMonth()+1}${now.getDate()}_${now.getHours()}${now.getMinutes()}`;
            const fileName = `Archive_${safeName}_${timestamp}.txt`;

            const BOM = '\uFEFF';
            const blob = new Blob([BOM + txt], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 100);
        };
        document.getElementById("viewModal").style.display = "block";
    }

    // تصدير كافة الجلسات الموجودة في الأرشيف في ملف واحد
    function exportAllSessions() {
        const all = getAllSessions();
        if(all.length === 0) return alert("لا توجد جلسات مؤرشفة");
        
        let fullReport = `========================================\n`;
        fullReport += `الأرشيف الكامل - م. عمار يوسف\n`;
        fullReport += `تاريخ الاستخراج: ${new Date().toLocaleDateString('ar-EG')}\n`;
        fullReport += `========================================\n\n`;
        
        all.forEach(s => {
            fullReport += generateSessionText(s);
        });

        const BOM = '\uFEFF';
        const blob = new Blob([BOM + fullReport], { type: 'text/plain;charset=utf-8' });
        const dateStr = new Date().toISOString().slice(0, 10);
        
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Full_Archive_Ammar_Survey_${dateStr}.txt`;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // حذف جلسة من الأرشيف
    function delS(dbN, id) { 
        if(confirm("هل أنت متأكد من الحذف النهائي؟")) { 
            let db = JSON.parse(localStorage.getItem(dbN)).filter(x => x.id !== id); 
            localStorage.setItem(dbN, JSON.stringify(db)); 
            init(); 
        } 
    }

    window.onload = init;
</script>
</body>
</html>
